name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build .vsix + GitHub Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Verify package.json version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag $TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - run: npm test

      - run: npm run build

      - name: Package .vsix
        id: package
        run: |
          npx vsce package
          VSIX=$(ls *.vsix | head -n 1)
          echo "vsix=$VSIX" >> "$GITHUB_OUTPUT"

      - name: Upload .vsix as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: ${{ steps.package.outputs.vsix }}

      # --- JetBrains plugin -------------------------------------------------
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Resolve plugin version
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "PLUGIN_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            echo "PLUGIN_VERSION=0.0.0-dev" >> "$GITHUB_ENV"
          fi

      - name: Build JetBrains plugin
        working-directory: jetbrains
        run: ./gradlew -PpluginVersion="$PLUGIN_VERSION" buildPlugin --console=plain

      - name: Upload plugin zip as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: jetbrains-plugin
          path: jetbrains/build/distributions/*.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: |
            ${{ steps.package.outputs.vsix }}
            jetbrains/build/distributions/*.zip
          body_path: CHANGELOG.md
          draft: false
          prerelease: false

      # --- Open VSX (Cursor / Windsurf / VSCodium) -------------------------
      # Publishes when the OVSX_PAT secret exists; skips silently otherwise.
      # The workflow only runs on tag pushes or manual dispatch, so a publish
      # from here always corresponds to a released (or explicitly chosen) tree.
      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        if: env.OVSX_PAT != ''
        run: |
          npx ovsx create-namespace CarlosJunior1992 -p "$OVSX_PAT" || true
          npx ovsx publish --packagePath "${{ steps.package.outputs.vsix }}" -p "$OVSX_PAT"

      # --- JetBrains Marketplace -------------------------------------------
      # Publishes (signed) when the 4 JB_* secrets exist; skips silently
      # otherwise. First-ever submission must be done manually via the web UI
      # (vendor creation + initial review) — see RELEASING.md.
      - name: Publish to JetBrains Marketplace
        env:
          JB_MARKETPLACE_TOKEN: ${{ secrets.JB_MARKETPLACE_TOKEN }}
          JB_CERTIFICATE_CHAIN: ${{ secrets.JB_CERTIFICATE_CHAIN }}
          JB_PRIVATE_KEY: ${{ secrets.JB_PRIVATE_KEY }}
          JB_PRIVATE_KEY_PASSWORD: ${{ secrets.JB_PRIVATE_KEY_PASSWORD }}
        if: env.JB_MARKETPLACE_TOKEN != '' && env.JB_CERTIFICATE_CHAIN != '' && env.JB_PRIVATE_KEY != '' && env.JB_PRIVATE_KEY_PASSWORD != '' && startsWith(github.ref, 'refs/tags/v')
        working-directory: jetbrains
        run: ./gradlew -PpluginVersion="$PLUGIN_VERSION" signPlugin publishPlugin --console=plain

      # --- Optional: automatic Marketplace publish -------------------------
      # The job above only builds the .vsix; publishing is done manually by
      # uploading it at https://marketplace.visualstudio.com/manage
      #
      # To automate it instead: create a PAT (Azure DevOps, scope
      # Marketplace > Manage), add it as the repo secret VSCE_PAT, and
      # uncomment the step below.
      #
      # - name: Publish to VSCode Marketplace
      #   env:
      #     VSCE_PAT: ${{ secrets.VSCE_PAT }}
      #   run: npx vsce publish --packagePath "${{ steps.package.outputs.vsix }}"
